---
# ============================================================================
# 11-ssh-key-deployment : Append authorized SSH public keys for existing accounts
# Adds public keys to a user's authorized_keys without removing existing keys.
# Idempotent: a key already present is not duplicated.
# Cross-distro: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. Idempotent; --check safe.
# Author: Filcu Alexandru
# ============================================================================

- name: Deploy SSH public keys to existing users
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    ssh_key_target_user: deploy
    ssh_authorized_keys: []

  tasks:
    - name: Ensure the target user's .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ssh_key_target_user }}/.ssh"
        state: directory
        owner: "{{ ssh_key_target_user }}"
        group: "{{ ssh_key_target_user }}"
        mode: "0700"

    - name: Append authorized SSH public keys
      ansible.builtin.lineinfile:
        path: "/home/{{ ssh_key_target_user }}/.ssh/authorized_keys"
        line: "{{ item }}"
        create: true
        owner: "{{ ssh_key_target_user }}"
        group: "{{ ssh_key_target_user }}"
        mode: "0600"
      loop: "{{ ssh_authorized_keys }}"
      loop_control:
        label: "{{ item.split() | last | default(item) }}"
