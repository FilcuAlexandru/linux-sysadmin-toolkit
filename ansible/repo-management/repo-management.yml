---
################################################################################
# repo-management.yml                                                          #
# Configure apt/yum repositories declaratively per distro family.              #
# Adds an APT repository (Debian) or a YUM/DNF repo file (RHEL).               #
# Uses builtin apt_repository and yum_repository modules.                      #
# Supports the four major families: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. #
# Idempotent and --check safe; ansible.builtin modules only.                   #
# Author: Filcu Alexandru                                                      #
################################################################################

- name: Manage package repositories
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    apt_repo_line: "deb http://deb.debian.org/debian bookworm-backports main"
    yum_repo_name: epel
    yum_repo_description: "Extra Packages for Enterprise Linux"
    yum_repo_baseurl: "https://download.example.com/epel/$releasever/$basearch/"
    yum_repo_gpgcheck: true

  tasks:
    - name: Manage an APT repository (Debian/Ubuntu)
      ansible.builtin.apt_repository:
        repo: "{{ apt_repo_line }}"
        state: present
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Manage a YUM/DNF repository (RHEL family)
      ansible.builtin.yum_repository:
        name: "{{ yum_repo_name }}"
        description: "{{ yum_repo_description }}"
        baseurl: "{{ yum_repo_baseurl }}"
        gpgcheck: "{{ yum_repo_gpgcheck }}"
        enabled: true
      when: ansible_os_family == 'RedHat'
