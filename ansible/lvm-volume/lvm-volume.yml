---
################################################################################
# lvm-volume.yml                                                               #
# Create a VG/LV, make a filesystem, and mount it (guarded).                   #
# Creates a volume group, logical volume, filesystem, and mount entry.         #
# Non-destructive: never shrinks or reformats an existing volume.              #
# Supports the four major families: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. #
# Idempotent and --check safe; ansible.builtin modules only.                   #
# Author: Filcu Alexandru                                                      #
################################################################################

- name: Provision an LVM logical volume and filesystem
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    lvm_pvs: /dev/sdb
    lvm_vg_name: datavg
    lvm_lv_name: datalv
    lvm_lv_size: 10g
    lvm_fs_type: ext4
    lvm_mount_point: /data

  tasks:
    - name: Check whether the physical volume is initialized
      ansible.builtin.command: "pvs --noheadings -o pv_name {{ lvm_pvs }}"
      register: lvm_pv_check
      changed_when: false
      failed_when: false

    - name: Initialize the physical volume if needed
      ansible.builtin.command: "pvcreate -y {{ lvm_pvs }}"
      when: lvm_pv_check.rc != 0
      changed_when: true

    - name: Check whether the volume group exists
      ansible.builtin.command: "vgs --noheadings -o vg_name {{ lvm_vg_name }}"
      register: lvm_vg_check
      changed_when: false
      failed_when: false

    - name: Create the volume group if needed
      ansible.builtin.command: "vgcreate {{ lvm_vg_name }} {{ lvm_pvs }}"
      when: lvm_vg_check.rc != 0
      changed_when: true

    - name: Check whether the logical volume exists
      ansible.builtin.command: "lvs --noheadings -o lv_name {{ lvm_vg_name }}/{{ lvm_lv_name }}"
      register: lvm_lv_check
      changed_when: false
      failed_when: false

    - name: Create the logical volume if needed
      ansible.builtin.command: "lvcreate -y -n {{ lvm_lv_name }} -L {{ lvm_lv_size }} {{ lvm_vg_name }}"
      when: lvm_lv_check.rc != 0
      changed_when: true

    - name: Create the filesystem only on a newly created volume
      ansible.builtin.command: "mkfs -t {{ lvm_fs_type }} /dev/{{ lvm_vg_name }}/{{ lvm_lv_name }}"
      when: lvm_lv_check.rc != 0
      changed_when: true

    - name: Ensure the mount point exists
      ansible.builtin.file:
        path: "{{ lvm_mount_point }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure the filesystem is mounted and in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: " {{ lvm_mount_point }} "
        line: "/dev/{{ lvm_vg_name }}/{{ lvm_lv_name }} {{ lvm_mount_point }} {{ lvm_fs_type }} defaults 0 2"
        owner: root
        group: root
        mode: "0644"
      notify: Mount all filesystems

  handlers:
    - name: Mount all filesystems  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: mount -a
      changed_when: false
