---
################################################################################
# password-policy.yml                                                          #
# Configure login.defs aging and pwquality complexity rules.                   #
# Sets password aging defaults in /etc/login.defs.                             #
# Deploys /etc/security/pwquality.conf complexity requirements.                #
# Supports the four major families: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. #
# Idempotent and --check safe; ansible.builtin modules only.                   #
# Author: Filcu Alexandru                                                      #
################################################################################

- name: Enforce password aging and complexity policy
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    pass_max_days: 90
    pass_min_days: 1
    pass_warn_age: 7
    pwquality_minlen: 14
    pwquality_dcredit: -1
    pwquality_ucredit: -1
    pwquality_ocredit: -1
    pwquality_lcredit: -1

  tasks:
    - name: Configure password aging in login.defs
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }}\t{{ item.value }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - {key: "PASS_MAX_DAYS", value: "{{ pass_max_days }}"}
        - {key: "PASS_MIN_DAYS", value: "{{ pass_min_days }}"}
        - {key: "PASS_WARN_AGE", value: "{{ pass_warn_age }}"}
      loop_control:
        label: "{{ item.key }}"

    - name: Deploy pwquality complexity policy
      ansible.builtin.copy:
        dest: /etc/security/pwquality.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible - password-policy.
          minlen = {{ pwquality_minlen }}
          dcredit = {{ pwquality_dcredit }}
          ucredit = {{ pwquality_ucredit }}
          ocredit = {{ pwquality_ocredit }}
          lcredit = {{ pwquality_lcredit }}
