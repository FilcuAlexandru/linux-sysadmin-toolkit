---
# ============================================================================
# 12-package-baseline : Ensure baseline packages are present and unwanted ones absent
# Installs a list of required packages and removes a list of unwanted ones.
# Uses the generic package module for cross-distro compatibility.
# Cross-distro: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. Idempotent; --check safe.
# Author: Filcu Alexandru
# ============================================================================

- name: Enforce a package baseline
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    packages_present:
      - vim
      - curl
      - sudo
      - chrony
    packages_absent:
      - telnet

  tasks:
    - name: Ensure baseline packages are installed
      ansible.builtin.package:
        name: "{{ packages_present }}"
        state: present

    - name: Ensure unwanted packages are removed
      ansible.builtin.package:
        name: "{{ packages_absent }}"
        state: absent
