---
# ============================================================================
# 15-ntp-time-sync : Install chrony and enforce a managed NTP server list
# Installs chrony and renders a managed chrony.conf with your NTP servers.
# Handles the differing config path and service name per distro.
# Cross-distro: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. Idempotent; --check safe.
# Author: Filcu Alexandru
# ============================================================================

- name: Configure time synchronization with chrony
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    chrony_config_path: "{{ '/etc/chrony/chrony.conf' if ansible_os_family == 'Debian' else '/etc/chrony.conf' }}"
    chrony_service_name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
    ntp_servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

  tasks:
    - name: Ensure chrony is installed
      ansible.builtin.package:
        name: chrony
        state: present

    - name: Deploy the chrony configuration
      ansible.builtin.copy:
        dest: "{{ chrony_config_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible - ntp-time-sync.
          {% for server in ntp_servers %}
          server {{ server }} iburst
          {% endfor %}
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
      notify: Restart chrony

    - name: Ensure chrony is enabled and running
      ansible.builtin.service:
        name: "{{ chrony_service_name }}"
        state: started
        enabled: true

  handlers:
    - name: Restart chrony
      ansible.builtin.service:
        name: "{{ chrony_service_name }}"
        state: restarted
