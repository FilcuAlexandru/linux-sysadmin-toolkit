---
# ============================================================================
# 08-disable-unused-services : Stop, disable, and mask risky or unused services if present
# Disables a configurable list of services, only acting on those present.
# Uses service_facts so absent units never cause failures.
# Cross-distro: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. Idempotent; --check safe.
# Author: Filcu Alexandru
# ============================================================================

- name: Disable and mask unnecessary services
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    disable_services:
      - telnet.socket
      - rsh.socket
      - rlogin.socket
      - avahi-daemon
      - cups

  tasks:
    - name: Gather installed service facts
      ansible.builtin.service_facts:

    - name: Stop and disable unnecessary services that are present
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ disable_services }}"
      when: item in ansible_facts.services
      loop_control:
        label: "{{ item }}"
