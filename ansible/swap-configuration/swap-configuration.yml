---
################################################################################
# swap-configuration.yml                                                       #
# Create and enable a swap file idempotently.                                  #
# Creates a swap file of a configurable size only if it does not exist.        #
# Enables it and adds a persistent fstab entry.                                #
# Supports the four major families: Debian/Ubuntu, RHEL/Rocky/Alma, SUSE/SLES. #
# Idempotent and --check safe; ansible.builtin modules only.                   #
# Author: Filcu Alexandru                                                      #
################################################################################

- name: Configure a swap file
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    swap_file_path: /swapfile
    swap_file_size_mb: 2048

  tasks:
    - name: Check whether the swap file already exists
      ansible.builtin.stat:
        path: "{{ swap_file_path }}"
      register: swap_stat

    - name: Allocate the swap file
      ansible.builtin.command:
        cmd: "fallocate -l {{ swap_file_size_mb }}M {{ swap_file_path }}"
        creates: "{{ swap_file_path }}"

    - name: Secure the swap file permissions
      ansible.builtin.file:
        path: "{{ swap_file_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Format the swap file
      ansible.builtin.command:
        cmd: "mkswap {{ swap_file_path }}"
      when: not swap_stat.stat.exists
      changed_when: true

    - name: Add the swap entry to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^{{ swap_file_path }}[[:space:]]"
        line: "{{ swap_file_path }} none swap sw 0 0"
        owner: root
        group: root
        mode: "0644"

    - name: Enable swap now
      ansible.builtin.command:
        cmd: "swapon {{ swap_file_path }}"
      when: not swap_stat.stat.exists
      changed_when: true
